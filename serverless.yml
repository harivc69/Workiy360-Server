service: workiy360-server

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  stage: dev
  memorySize: 512
  timeout: 30

functions:
  api:
    handler: app.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

plugins:
  - serverless-offline

package:
  exclude:
    - node_modules/**
    - .gitignore
    - .git/**
    - README.md
    - scripts/**
    - aws/**
    - config/**
    - controllers/**
    - middlewares/**
    - routers/**
    - utils/**
    - test/**
    - tests/**
    - coverage/**
    - .vscode/**
    - .env
    - .env.*

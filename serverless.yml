frameworkVersion: '~4.17.1'
service: w360-api

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-south-1
  stackName: w360-api-dev
  stage: dev
  memorySize: 512
  timeout: 30
  deploymentBucket:
    name: w360-api-dev-deployment-bucket  

functions:
  W360:
    handler: app.handler
    name: W360-dev
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    platform: node
    target: node18
    exclude:
      - aws-sdk
    external:
      - express
